<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全网吐槽墙</title>
    <meta name="description" content="匿名说出你想说的，每条吐槽都是人民群众的声音">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header p { color: #888; font-size: 1.1em; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        .input-area {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .input-area textarea {
            width: 100%;
            height: 100px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 12px;
            color: #e0e0e0;
            font-size: 16px;
            resize: vertical;
            font-family: inherit;
        }
        .input-area textarea:focus { outline: none; border-color: #ff6b6b; }
        .input-area .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            gap: 10px;
        }
        .input-area input[type="text"] {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px 12px;
            color: #e0e0e0;
            font-size: 14px;
        }
        .input-area input[type="text"]:focus { outline: none; border-color: #ff6b6b; }
        .input-area .char-count { color: #666; font-size: 12px; }
        .btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            white-space: nowrap;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .post {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        .post:hover { border-color: #555; }
        .post .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 13px;
            color: #666;
        }
        .post .nickname { color: #ffd93d; font-weight: bold; }
        .post .time { color: #555; }
        .post .content {
            font-size: 15px;
            line-height: 1.6;
            word-break: break-word;
        }
        .post .actions {
            margin-top: 10px;
            display: flex;
            gap: 16px;
            font-size: 13px;
        }
        .post .actions span {
            cursor: pointer;
            color: #666;
            transition: color 0.2s;
            user-select: none;
        }
        .post .actions span:hover { color: #ff6b6b; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #555;
        }
        .empty-state .big-emoji { font-size: 64px; margin-bottom: 20px; }

        .footer {
            text-align: center;
            padding: 30px;
            color: #444;
            font-size: 13px;
        }

        .loading { text-align: center; padding: 30px; color: #555; }
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #333; color: #e0e0e0; padding: 12px 24px; border-radius: 8px;
            font-size: 14px; display: none; z-index: 999;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.8em; }
            .input-area .info { flex-direction: column; }
            .input-area input[type="text"] { width: 100%; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🗣️ 全网吐槽墙</h1>
        <p>匿名说出你想说的 — 所有人都能看到</p>
    </div>
    
    <div class="container">
        <div class="input-area">
            <textarea id="content" placeholder="写你想吐槽的..." maxlength="500"></textarea>
            <div class="info">
                <input type="text" id="nickname" placeholder="匿名用户" maxlength="20">
                <div>
                    <span class="char-count"><span id="counter">0</span>/500</span>
                    <button class="btn" id="submitBtn" onclick="submitPost()">发送吐槽</button>
                </div>
            </div>
        </div>
        
        <div id="posts">
            <div class="loading">加载中...</div>
        </div>
        
        <div class="footer">
            数据实时共享 · Realtime Database · 开源源码
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDA-zk7rLU7o8litC1BlURyocYprLqAb80",
            authDomain: "planning-with-ai-e9272.firebaseapp.com",
            databaseURL: "https://venting-and-complaining-default-rtdb.firebaseio.com",
            projectId: "planning-with-ai-e9272",
            storageBucket: "planning-with-ai-e9272.firebasestorage.app",
            messagingSenderId: "207850905652",
            appId: "1:207850905652:web:f158f5b24b98ebad93aa61"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const postsRef = db.ref('posts');

        // 实时加载吐槽
        postsRef.orderByChild('createdAt').limitToLast(100).on('value', (snapshot) => {
            const container = document.getElementById('posts');
            const data = snapshot.val();
            
            if (!data) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="big-emoji">💬</div>
                        <p>还没有吐槽，快来当第一个！</p>
                    </div>
                `;
                return;
            }

            // 转为数组并按时间倒序
            const posts = Object.entries(data).map(([key, val]) => ({key, ...val}));
            posts.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

            let html = '';
            posts.forEach(post => {
                html += `
                    <div class="post">
                        <div class="meta">
                            <span class="nickname">${escapeHtml(post.nickname || '匿名用户')}</span>
                            <span class="time">${post.time || '刚刚'}</span>
                        </div>
                        <div class="content">${escapeHtml(post.content)}</div>
                        <div class="actions">
                            <span onclick="likePost('${post.key}')">❤️ ${post.likes || 0}</span>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        });

        // 提交吐槽
        async function submitPost() {
            const content = document.getElementById('content').value.trim();
            const nickname = document.getElementById('nickname').value.trim() || '匿名用户';
            
            if (!content) {
                showToast('写点内容再发吧！');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '发送中...';

            try {
                await postsRef.push({
                    nickname: nickname,
                    content: content,
                    likes: 0,
                    time: new Date().toLocaleString('zh-CN'),
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });

                document.getElementById('content').value = '';
                document.getElementById('counter').textContent = '0';
                showToast('吐槽已发送！');
            } catch (e) {
                showToast('发送失败');
            }

            btn.disabled = false;
            btn.textContent = '发送吐槽';
        }

        // 点赞
        async function likePost(key) {
            const ref = db.ref('posts/' + key + '/likes');
            try {
                const snap = await ref.once('value');
                await ref.set((snap.val() || 0) + 1);
            } catch (e) {
                showToast('操作失败');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 2000);
        }

        document.getElementById('content').addEventListener('input', function() {
            document.getElementById('counter').textContent = this.value.length;
        });
    </script>
</body>
</html>
