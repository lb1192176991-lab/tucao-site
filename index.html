<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弹幕吐槽墙</title>
    <meta name="description" content="匿名吐槽弹幕墙">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            background: #0a0a0a;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ===== 弹幕容器 ===== */
        #danmaku-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 70%);
        }

        .danmaku {
            position: absolute;
            white-space: nowrap;
            font-size: 18px;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 20px;
            pointer-events: none;
            animation: fly 8s linear forwards;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        @keyframes fly {
            0% { transform: translateX(100vw); opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(-100%); opacity: 0; }
        }

        /* 不同颜色 */
        .danmaku:nth-child(6n+1) { background: rgba(255,107,107,0.25); color: #ff6b6b; }
        .danmaku:nth-child(6n+2) { background: rgba(255,217,61,0.25); color: #ffd93d; }
        .danmaku:nth-child(6n+3) { background: rgba(107,203,119,0.25); color: #6bcb77; }
        .danmaku:nth-child(6n+4) { background: rgba(77,166,255,0.25); color: #4da6ff; }
        .danmaku:nth-child(6n+5) { background: rgba(255,128,255,0.25); color: #ff80ff; }
        .danmaku:nth-child(6n+0) { background: rgba(255,200,100,0.25); color: #ffc864; }

        .danmaku .nick {
            font-size: 12px;
            opacity: 0.7;
            margin-right: 6px;
        }

        /* ===== 底部输入区 ===== */
        .input-area {
            background: linear-gradient(0deg, #1a1a1a, #0f0f0f);
            padding: 20px 20px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #222;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 700px;
        }

        .input-row input[type="text"] {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            border-radius: 25px;
            padding: 12px 20px;
            color: #e0e0e0;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-row input[type="text"]:focus { border-color: #ff6b6b; }

        .input-row .btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 28px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            white-space: nowrap;
        }
        .input-row .btn:hover { transform: scale(1.05); }
        .input-row .btn:active { transform: scale(0.95); }
        .input-row .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .input-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 700px;
            font-size: 13px;
            color: #666;
        }

        .input-meta input {
            background: #222;
            border: 1px solid #444;
            border-radius: 15px;
            padding: 6px 14px;
            color: #e0e0e0;
            font-size: 13px;
            width: 120px;
            outline: none;
        }
        .input-meta input:focus { border-color: #888; }
        .input-meta .char-count { margin-left: auto; }

        .toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #e0e0e0;
            padding: 10px 24px; border-radius: 20px;
            font-size: 14px; display: none; z-index: 999;
            backdrop-filter: blur(10px);
        }

        .hint {
            font-size: 12px;
            color: #444;
            text-align: center;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <!-- 弹幕容器 -->
    <div id="danmaku-container"></div>

    <!-- 输入区 -->
    <div class="input-area">
        <div class="input-row">
            <input type="text" id="content" placeholder="写你想吐槽的..." maxlength="100" autofocus>
            <button class="btn" id="submitBtn" onclick="submitPost()">发射弹幕</button>
        </div>
        <div class="input-meta">
            <input type="text" id="nickname" placeholder="匿名" maxlength="10">
            <span class="char-count"><span id="counter">0</span>/100</span>
        </div>
        <div class="hint">按 Enter 发射 · 全部匿名 · 人人可见</div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDA-zk7rLU7o8litC1BlURyocYprLqAb80",
            authDomain: "planning-with-ai-e9272.firebaseapp.com",
            databaseURL: "https://venting-and-complaining-default-rtdb.firebaseio.com",
            projectId: "planning-with-ai-e9272",
            storageBucket: "planning-with-ai-e9272.firebasestorage.app",
            messagingSenderId: "207850905652",
            appId: "1:207850905652:web:f158f5b24b98ebad93aa61"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const postsRef = db.ref('posts');

        const container = document.getElementById('danmaku-container');

        // 每条新吐槽 → 发射弹幕
        postsRef.orderByChild('createdAt').limitToLast(1).on('child_added', (snapshot) => {
            const data = snapshot.val();
            if (!data || !data.content) return;

            // 随机行数
            const lines = 6;
            const lineHeight = window.innerHeight / lines;
            const line = Math.floor(Math.random() * lines);
            const top = line * lineHeight + lineHeight * 0.2;

            // 随机速度
            const duration = 6 + Math.random() * 4;

            const el = document.createElement('div');
            el.className = 'danmaku';
            el.innerHTML = `<span class="nick">${escapeHtml(data.nickname || '匿名')}</span>${escapeHtml(data.content)}`;
            el.style.top = top + 'px';
            el.style.animationDuration = duration + 's';

            container.appendChild(el);

            // 动画结束后移除
            setTimeout(() => el.remove(), (duration + 1) * 1000);
        });

        // 提交
        async function submitPost() {
            const content = document.getElementById('content').value.trim();
            const nickname = document.getElementById('nickname').value.trim() || '匿名';
            
            if (!content) {
                showToast('写点内容再发射！');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '发射中...';

            try {
                await postsRef.push({
                    nickname: nickname,
                    content: content,
                    likes: 0,
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });
                document.getElementById('content').value = '';
                document.getElementById('counter').textContent = '0';
                showToast('弹幕已发射！');
            } catch (e) {
                showToast('发射失败');
            }

            btn.disabled = false;
            btn.textContent = '发射弹幕';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 2000);
        }

        document.getElementById('content').addEventListener('input', function() {
            document.getElementById('counter').textContent = this.value.length;
        });

        // Enter 发送
        document.getElementById('content').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                submitPost();
            }
        });
    </script>
</body>
</html>
